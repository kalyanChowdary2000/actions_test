name: Deploy React App to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      EC2_REPO_PATH: ${{ secrets.EC2_REPO_PATH || secrets.EC2_DEPLOY_PATH }}
      PM2_PROCESS_NAME: ${{ secrets.PM2_PROCESS_NAME || 'actions_test' }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || 'main' }}
      REPO_SLUG: ${{ github.repository }}

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2 as root
        run: |
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "sudo -i bash -lc '
              set -e
              mkdir -p \"$EC2_REPO_PATH\"
              cd \"$EC2_REPO_PATH\"

              if [ ! -d .git ]; then
                rm -rf ./*
                git init
                git remote add origin \"https://github.com/$REPO_SLUG.git\"
              fi

              git remote set-url origin \"https://github.com/$REPO_SLUG.git\"
              git fetch origin \"$DEPLOY_BRANCH\"
              git checkout -B \"$DEPLOY_BRANCH\" \"origin/$DEPLOY_BRANCH\"
              git pull --ff-only origin \"$DEPLOY_BRANCH\"
              npm i
              npm run build
              echo \"Deployed commit: \$(git rev-parse --short HEAD)\"
              pm2 restart \"$PM2_PROCESS_NAME\" --update-env || pm2 start npm --name \"$PM2_PROCESS_NAME\" -- run dev -- --host 0.0.0.0 --port 80
              pm2 save
              pm2 ls
              curl -I http://127.0.0.1:80 | head -n 1
            '"
