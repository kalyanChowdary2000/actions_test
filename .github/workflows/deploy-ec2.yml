name: Deploy React App to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ vars.EC2_PORT || 22 }}" -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy path exists
        run: |
          ssh -p "${{ vars.EC2_PORT || 22 }}" "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}" \
            "mkdir -p '${{ vars.EC2_DEPLOY_PATH }}'"

      - name: Upload built assets
        run: |
          scp -P "${{ vars.EC2_PORT || 22 }}" -r dist/* \
            "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:${{ vars.EC2_DEPLOY_PATH }}/"
